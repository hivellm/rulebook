name: Release

# npm Trusted Publisher (OIDC) — mirrors the proven hivellm/thunder setup:
# npm verifies this workflow's OIDC identity (org/repo/workflow/environment)
# and mints a short-lived credential itself. No token to store, leak or
# rotate; provenance attestations are automatic.
#
# One-time owner setup at https://www.npmjs.com/package/@hivehub/rulebook/access
#   organization: hivellm | repository: rulebook | workflow: release.yml
#   environment: npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: npm (@hivehub/rulebook)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # REQUIRED for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      # Trusted publishing needs Node >= 22.14 and npm >= 11.5.1 — this is the
      # publisher's Node version, not the package's support floor.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Require an npm new enough for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Guard - tag must match package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Full quality gate
        run: |
          npm run type-check
          npm run lint
          npx prettier --check "src/**/*.ts" "tests/**/*.ts"
          npm test

      - name: Publish (OIDC — no token, provenance automatic)
        run: npm publish --access public
